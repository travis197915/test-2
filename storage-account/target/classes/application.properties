# Disable default Whitelabel error page
server.error.whitelabel.enabled=false

# Do not expose internal error details
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# Always forward errors to /error
server.error.path=/error

# Multipart upload limits (match 50MB business rule)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Simple key/secret authentication
storage.auth.access-key=${STORAGE_ACCESS_KEY:toystack-admin}
storage.auth.secret=${STORAGE_SECRET:change-this-secret}


