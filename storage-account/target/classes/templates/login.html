<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Storage Login</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f3f4f6; margin: 0; }
        .box { max-width: 420px; margin: 80px auto; background: #fff; padding: 24px; border-radius: 10px; box-shadow: 0 3px 16px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; }
        label { display: block; font-size: 14px; margin: 10px 0 6px; }
        input { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; }
        button { margin-top: 14px; width: 100%; padding: 10px; border: 0; border-radius: 6px; background: #2563eb; color: #fff; cursor: pointer; }
        .error { margin-top: 10px; color: #b91c1c; font-size: 14px; }
    </style>
</head>
<body>
<div class="box">
    <h2>Storage Login</h2>
    <form method="post" th:action="@{/login}">
        <label for="accessKey">Access Key</label>
        <input id="accessKey" name="accessKey" required>

        <label for="secret">Secret</label>
        <input id="secret" name="secret" type="password" required>

        <button type="submit">Login</button>
    </form>
    <div class="error" th:if="${error}" th:text="${error}"></div>
</div>
</body>
</html>
