<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Storage Explorer</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f8fafc; margin: 0; color: #111827; }
        .wrap { max-width: 1000px; margin: 20px auto; background: #fff; border-radius: 10px; box-shadow: 0 3px 16px rgba(0,0,0,0.08); overflow: hidden; }
        .header { padding: 16px; background: #1f2937; color: #fff; display: flex; justify-content: space-between; align-items: center; }
        .content { padding: 16px; }
        .path { background: #eef2ff; border: 1px solid #c7d2fe; padding: 8px 10px; border-radius: 6px; margin-bottom: 14px; }
        .row { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
        form { display: inline-flex; gap: 8px; align-items: center; }
        input[type=text], input[type=file] { padding: 8px; border: 1px solid #d1d5db; border-radius: 6px; }
        button { padding: 8px 10px; border: 0; border-radius: 6px; background: #2563eb; color: #fff; cursor: pointer; }
        .danger { background: #dc2626; }
        .muted { background: #6b7280; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; border-bottom: 1px solid #e5e7eb; padding: 10px; }
        .ok { color: #166534; margin-bottom: 10px; }
        .err { color: #b91c1c; margin-bottom: 10px; }
        .link { color: #1d4ed8; text-decoration: none; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="header">
        <strong>Storage Explorer</strong>
        <form method="post" th:action="@{/logout}">
            <button class="muted" type="submit">Logout</button>
        </form>
    </div>
    <div class="content">
        <div class="ok" th:if="${success}" th:text="${success}"></div>
        <div class="err" th:if="${error}" th:text="${error}"></div>

        <div class="path">
            Current path:
            <strong th:text="${currentPath.isEmpty()} ? '/' : currentPath"></strong>
            <a class="link" th:if="${!currentPath.isEmpty()}" th:href="@{/ui(path=${parentPath})}">[Up]</a>
        </div>

        <div class="row">
            <form method="post" th:action="@{/ui/folder}">
                <input type="hidden" name="path" th:value="${currentPath}">
                <input type="text" name="name" placeholder="New folder name" required>
                <button type="submit">Create Folder</button>
            </form>
        </div>

        <div class="row">
            <form method="post" enctype="multipart/form-data" th:action="@{/ui/upload}">
                <input type="hidden" name="path" th:value="${currentPath}">
                <input type="file" name="file" required>
                <button type="submit">Upload File</button>
            </form>
        </div>

        <table>
            <thead>
            <tr>
                <th>Name</th>
                <th>Type</th>
                <th>Size</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${items}">
                <td>
                    <a class="link" th:if="${item.directory}" th:href="@{/ui(path=${item.relativePath})}" th:text="${item.name}"></a>
                    <span th:if="${!item.directory}" th:text="${item.name}"></span>
                </td>
                <td th:text="${item.directory} ? 'Folder' : 'File'"></td>
                <td th:text="${item.directory} ? '-' : (item.size + ' bytes')"></td>
                <td>
                    <a class="link" th:if="${!item.directory}" th:href="@{'/api/storage/' + ${item.relativePath}}" target="_blank">View</a>
                    <span th:if="${!item.directory}"> | </span>
                    <a class="link" th:if="${!item.directory}" th:href="@{'/api/storage/' + ${item.relativePath}(download='true')}">Download</a>
                    <span th:if="${!item.directory}"> | </span>
                    <form method="post" th:action="@{/ui/delete}" style="display:inline-flex;">
                        <input type="hidden" name="path" th:value="${currentPath}">
                        <input type="hidden" name="target" th:value="${item.name}">
                        <button class="danger" type="submit">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
